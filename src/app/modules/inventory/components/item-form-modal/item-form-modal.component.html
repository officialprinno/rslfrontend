<app-modal [open]="open()" [title]="title()" size="xl" (close)="onClose()">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <h4 class="section-title text-sm mb-3">Basic Information</h4>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="input-label">Item Code</label>
          <input type="text" formControlName="code" class="input-field font-mono uppercase" />
          @if (fieldError('code')) { <p class="input-error">{{ fieldError('code') }}</p> }
        </div>
        <div>
          <label class="input-label">Item Name *</label>
          <input type="text" formControlName="name" class="input-field" [class.input-field--error]="fieldError('name')" />
          @if (fieldError('name')) { <p class="input-error">{{ fieldError('name') }}</p> }
        </div>
        <div>
          <label class="input-label">Category *</label>
          <select formControlName="category" class="input-field" [class.input-field--error]="fieldError('category')">
            <option [ngValue]="null">Select category</option>
            @for (cat of categoriesList(); track cat.id) {
              <option [ngValue]="cat.id">{{ cat.name }}</option>
            }
          </select>
          @if (fieldError('category')) { <p class="input-error">{{ fieldError('category') }}</p> }
        </div>
        <div>
          <label class="input-label">Item Type *</label>
          <select formControlName="item_type" class="input-field">
            @for (t of itemTypes; track t) { <option [value]="t">{{ itemTypeLabel(t) }}</option> }
          </select>
        </div>
        <div>
          <label class="input-label">Usage *</label>
          <select formControlName="item_usage" class="input-field">
            @for (u of itemUsageOptions; track u.value) {
              <option [value]="u.value">{{ u.label }}</option>
            }
          </select>
        </div>
        <div class="sm:col-span-2">
          <label class="input-label">Description</label>
          <textarea formControlName="description" rows="2" class="input-field resize-none"></textarea>
        </div>
        <div>
          <label class="input-label">Unit of Measure *</label>
          <select formControlName="unit_of_measure" class="input-field">
            @for (u of units; track u) { <option [value]="u">{{ u }}</option> }
          </select>
        </div>
        <div class="flex items-center gap-6 pt-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" formControlName="is_active" class="login-checkbox" />
            <span class="text-sm text-gray-700">Active</span>
          </label>
        </div>
      </div>
    </div>

    <div>
      <h4 class="section-title text-sm mb-3">Pricing</h4>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="input-label">Currency *</label>
          <select formControlName="currency" class="input-field" [class.input-field--error]="fieldError('currency')">
            <option [ngValue]="null">Select currency</option>
            @for (c of currencies(); track c.id) {
              <option [ngValue]="c.id">{{ c.code }} — {{ c.name }}</option>
            }
          </select>
          @if (fieldError('currency')) { <p class="input-error">{{ fieldError('currency') }}</p> }
        </div>
        <div>
          <label class="input-label">Unit Cost *</label>
          <input type="number" formControlName="unit_cost" min="0" step="0.01" class="input-field" />
        </div>
        <div>
          <label class="input-label">Selling Price *</label>
          <input type="number" formControlName="selling_price" min="0" step="0.01" class="input-field" />
        </div>
      </div>
    </div>

    <div>
      <h4 class="section-title text-sm mb-3">Stock Settings</h4>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="input-label">Reorder Level *</label>
          <input type="number" formControlName="reorder_level" min="0" class="input-field" />
        </div>
        <div class="flex items-center gap-6 pt-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" formControlName="has_serial_number" class="login-checkbox" />
            <span class="text-sm text-gray-700">Serial Number</span>
          </label>
        </div>
        <div class="flex items-center gap-6 pt-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" formControlName="has_expiry_date" class="login-checkbox" />
            <span class="text-sm text-gray-700">Expiry Date</span>
          </label>
        </div>
      </div>
    </div>
  </form>

  <div modalFooter>
    <button type="button" class="btn-secondary" (click)="onClose()">Cancel</button>
    <button type="button" class="btn-primary" [disabled]="loading()" (click)="onSubmit()">
      @if (loading()) { <span class="spinner spinner-sm"></span> }
      Save Item
    </button>
  </div>
</app-modal>
