<div class="page-container">
  <app-procurement-nav />
  <app-page-header [title]="editId() ? 'Edit Requisition' : 'New Requisition'" subtitle="Add items and submit for approval">
    <a routerLink="/procurement/requisitions" class="btn-secondary">Back to List</a>
  </app-page-header>

  <form [formGroup]="form" class="card p-6 space-y-6">
    <div>
      <h4 class="text-sm font-semibold mb-3">Requisition Details</h4>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="input-label">Department *</label>
          <select formControlName="department" class="input-field">
            <option [ngValue]="null">Select department</option>
            @for (d of deptList(); track d.id) { <option [ngValue]="d.id">{{ d.name }}</option> }
          </select>
        </div>
        <div>
          <label class="input-label">Priority *</label>
          <select formControlName="priority" class="input-field">
            @for (p of priorities; track p.value) { <option [value]="p.value">{{ p.label }}</option> }
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="input-label">Notes</label>
          <textarea formControlName="notes" rows="3" class="input-field resize-none"></textarea>
        </div>
      </div>
    </div>

    <div>
      <div class="flex items-center justify-between mb-3">
        <h4 class="text-sm font-semibold">Items *</h4>
        <button type="button" class="btn-ghost !text-xs" (click)="addLine()">+ Add Item</button>
      </div>
      <div formArrayName="lineItems" class="space-y-3">
        @for (line of lineItems().controls; track $index; let i = $index) {
          <div [formGroupName]="i" class="grid grid-cols-12 gap-2 items-end p-3 bg-gray-50 rounded-xl">
            <div class="col-span-12 md:col-span-4">
              <label class="input-label">Item</label>
              <app-searchable-select
                [options]="itemOptions()"
                [value]="line.value.item"
                placeholder="Search item..."
                (valueChange)="onItemSelect(i, $event)"
              />
            </div>
            <div class="col-span-4 md:col-span-2">
              <label class="input-label">Qty</label>
              <input type="number" formControlName="quantity_requested" min="0.0001" step="0.01" class="input-field" />
            </div>
            <div class="col-span-4 md:col-span-2">
              <label class="input-label">Est. Unit Cost</label>
              <input type="number" formControlName="unit_cost_estimate" min="0" step="0.01" class="input-field" />
            </div>
            <div class="col-span-3 md:col-span-2">
              <label class="input-label">Total</label>
              <p class="input-field bg-white !py-2.5 font-semibold">{{ formatCurrency(lineTotal(i)) }}</p>
            </div>
            <div class="col-span-1">
              <button type="button" class="btn-ghost !text-red-600 !px-2" (click)="removeLine(i)" [disabled]="lineItems().length <= 1">×</button>
            </div>
          </div>
        }
      </div>
      <div class="flex justify-end mt-4 pt-4 border-t">
        <span class="text-sm text-gray-500 mr-2">Running Total:</span>
        <span class="text-lg font-bold text-[#1B3A6B]">{{ formatCurrency(runningTotal()) }}</span>
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t">
      <button type="button" class="btn-secondary" [disabled]="saving()" (click)="saveDraft()">Save as Draft</button>
      <button type="button" class="btn-primary" [disabled]="saving()" (click)="submitForApproval()">Submit for Approval</button>
    </div>
  </form>
</div>
